apiVersion: apps/v1
kind: Deployment

metadata:
  name: emailservice

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: emailservice

  template:
    metadata:
      labels:
        app: emailservice

    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 5

      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

      containers:
        - name: server

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          ports:
            - containerPort: {{ .Values.containerPort }}

          env:
            - name: PORT
              value: "8080"

            - name: DISABLE_PROFILER
              value: "1"

          resources:
{{ toYaml .Values.resources | indent 12 }}
